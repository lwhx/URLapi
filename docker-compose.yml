version: '3.8'

services:
  image-to-base64:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: image-to-base64-api
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - GALLERY_PASSWORD=your_password_here  # 设置图库访问密码
