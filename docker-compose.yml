version: '3.8'

services:
  urlapi:
    image: ghcr.io/lwhx/urlapi:latest
    container_name: urlapi
    ports:
      - "5700:5000"
    volumes:
      - /home/URLapi/uploads:/app/uploads
    restart: unless-stopped
    environment:
      # Python 配置
      - PYTHONUNBUFFERED=1

      # 认证配置
      - GALLERY_PASSWORD=your_secure_password_here
      - SESSION_SECRET=your_random_secret_key_here_change_this

      # 文件上传配置
      - UPLOAD_FOLDER=/app/uploads
      - MAX_FILE_SIZE=104857600
      - MAX_CONTENT_LENGTH=146800640

      # 网络配置
      - DOWNLOAD_TIMEOUT_SECONDS=30
      - DOWNLOAD_CHUNK_SIZE=1048576

      # 性能配置
      - THREAD_POOL_SIZE=4

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
